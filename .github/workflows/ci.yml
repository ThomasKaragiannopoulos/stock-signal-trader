name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "ruff==0.15.17" pytest

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Test (pytest)
        env:
          OPENAI_API_KEY: test
          ALPACA_API_KEY: test
          ALPACA_SECRET_KEY: test
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest tests/ -v
