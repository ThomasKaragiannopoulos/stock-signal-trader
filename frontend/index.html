<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Signal Trader — Opportunities</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <a href="/" class="brand">Signal Trader</a>
    <a href="/" data-page="opportunities" class="active">Opportunities</a>
    <a href="/portfolio.html" data-page="portfolio">Portfolio</a>
    <a href="/history.html" data-page="history">History</a>
  </nav>

  <main>
    <div class="toolbar">
      <div>
        <h1>Opportunities</h1>
        <p class="subtitle">Signal-fused trade candidates with LLM analysis. Confidence &gt; 50% shown.</p>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <select id="ticker-filter" class="ticker-select" onchange="filterCards()">
          <option value="">All tickers</option>
          <option>AAPL</option><option>MSFT</option><option>GOOGL</option>
          <option>AMZN</option><option>NVDA</option><option>META</option>
          <option>TSLA</option><option>JPM</option><option>V</option>
          <option>MA</option><option>UNH</option><option>HD</option>
          <option>PG</option><option>JNJ</option><option>XOM</option>
          <option>BAC</option><option>DIS</option><option>NFLX</option>
          <option>AMD</option><option>PYPL</option>
        </select>
        <button id="scan-btn" class="btn btn-scan" onclick="triggerScan()">Scan Now</button>
      </div>
    </div>

    <div id="scan-progress" class="scan-progress hidden">
      <div class="scan-progress-header">
        <span id="scan-phase-label">Scanning…</span>
        <span id="scan-phase-counter"></span>
      </div>
      <div class="scan-progress-track">
        <div id="scan-progress-bar" class="scan-progress-fill" style="width:0%"></div>
      </div>
      <div id="scan-live-tickers" class="scan-live-tickers"></div>
    </div>

    <div id="cards" class="cards">
      <p class="empty">Loading…</p>
    </div>
  </main>

  <div id="toast"></div>
  <script src="app.js"></script>
  <script>loadOpportunities();</script>
</body>
</html>
